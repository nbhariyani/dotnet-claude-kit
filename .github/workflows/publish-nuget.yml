name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 0.5.0)'
        required: true
        type: string
      dry-run:
        description: 'Dry run — pack only, skip push'
        required: false
        type: boolean
        default: false

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: mcp/CWM.RoslynNavigator/CWM.RoslynNavigator.csproj
  TEST_PATH: mcp/CWM.RoslynNavigator/tests/CWM.RoslynNavigator.Tests.csproj

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test
        run: dotnet test ${{ env.TEST_PATH }} -c Release --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack
        run: dotnet pack ${{ env.PROJECT_PATH }} -c Release -o ./nupkg /p:Version=${{ inputs.version }} /p:ContinuousIntegrationBuild=true

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: pack
    if: ${{ inputs.dry-run == false }}
    environment: nuget
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/CWM.RoslynNavigator.${{ inputs.version }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: CWM.RoslynNavigator v${{ inputs.version }}
          body: |
            ## Install

            ```bash
            dotnet tool install -g CWM.RoslynNavigator --version ${{ inputs.version }}
            ```

            ## What's included

            15 read-only Roslyn MCP tools for AI-powered .NET codebase navigation.

            See [README](https://github.com/codewithmukesh/dotnet-claude-kit/blob/main/mcp/CWM.RoslynNavigator/README.md) for details.
          generate_release_notes: true
          files: ./nupkg/*
